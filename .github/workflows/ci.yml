name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, xml, bcmath, curl, zip, intl, gd
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Copy .env
        run: cp .env.example .env

      - name: Override DB to SQLite for CI
        run: |
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST=.*/#DB_HOST=/' .env
          sed -i 's/^DB_PORT=.*/#DB_PORT=/' .env
          sed -i 's/^DB_DATABASE=.*/#DB_DATABASE=/' .env
          sed -i 's/^DB_USERNAME=.*/#DB_USERNAME=/' .env
          sed -i 's/^DB_PASSWORD=.*/#DB_PASSWORD=/' .env
          sed -i 's/^DB_SSLMODE=.*/#DB_SSLMODE=/' .env
          touch database/database.sqlite

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations with seeders
        run: php artisan migrate:fresh --seed --force

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: php artisan test --parallel
